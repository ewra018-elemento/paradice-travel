<header>
    <h1>Paradise Travel - Registro de Viajeros</h1>

  <main class="login-page-wrapper">
    
    <form class="contenedor-formulario">
        <h2>Datos Básicos del Cliente</h2>
        
        <label for="nombres">Nombres:</label>
        <input type="text" id="nombres" required>
        
        <label for="apellidos">Apellidos:</label>
        <input type="text" id="apellidos" required>
        
        <label for="cedula">Cédula de Ciudadanía:</label>
        <input type="text" id="cedula" required>
        
        <label for="nacimiento">Fecha de Nacimiento:</label>
        <input type="date" id="nacimiento" required>
        
        <button type="submit">Registrarse</button>
    </form>
